<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Yalex</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* 🎬 VIDEO */
#bg-video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    transition: opacity 0.5s ease;
}

#bg-video.oculto {
    opacity: 0;
    pointer-events: none;
}

/* ☰ BOTÓN */
.menu-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    font-size: 30px;
    cursor: pointer;
    z-index: 20;
}

/* 📂 MENÚ */
.menu {
    position: fixed;
    top: 0;
    left: -220px;
    width: 220px;
    height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    padding-top: 60px;
    transition: 0.4s;
    z-index: 15;
}

.menu button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 15px;
    border: none;
    background: none;
    color: white;
    cursor: pointer;
}

.menu button:hover {
    background: cyan;
}

.icono-img {
    width: 25px;
}

/* 📦 SECCIONES */
.seccion {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    padding-top: 100px;
    text-align: center;

    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;

    opacity: 0;
    transform: scale(1.1);
    filter: blur(10px);
    transition: all 0.7s cubic-bezier(0.77, 0, 0.18, 1);

    pointer-events: none;
}

.seccion.active {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
    z-index: 1;
    pointer-events: auto;
}

.seccion.saliendo {
    opacity: 0;
    transform: scale(0.9);
    filter: blur(10px);
}

/* 💖 TEXTO */
h1, p {
    text-shadow: 2px 2px 10px black;
}

/* 💖 CARTA */
#carta {
    max-width: 500px;
    margin: auto;
    font-size: 18px;
    font-style: italic;
    color: #FFFFFF;
    white-space: pre-line;
}

/* ✨ CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}

/* 🎨 FONDOS AJUSTADOS */
#main { background: transparent; }

#gaby {
    background-image: url("gaby.jpg");
    background-position: center 25%;
}

#evodio {
    background-image: url("evodio.jpg");
    background-position: center;
}

#margarita {
    background-image: url("margarita.jpg");
    background-position: center;
}

#minion {
    background-image: url("minion.jpg");
    background-position: center;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
    <source src="video.mp4" type="video/mp4">
</video>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
    <button onclick="mostrar('main')">🏠 Inicio</button>
    <button onclick="mostrar('gaby')">⭐ Gaby</button>
    <button onclick="mostrar('evodio')">
        <img class="icono-img" src="cruzazul.png"> Evodio
    </button>
    <button onclick="mostrar('margarita')">❤️ Margarita</button>
    <button onclick="mostrar('minion')"> Minion</button>
</div>

<div id="main" class="seccion active">
    <h1>Weeeeell, esta sera la nueva pagina de Yalex</h1>
</div>

<div id="gaby" class="seccion">
    <h1>💖 Para Mi Mujel 💖</h1>
    <div id="carta"></div>
    <canvas id="canvas"></canvas>
</div>

<div id="evodio" class="seccion"><h1>Evodio</h1></div>
<div id="margarita" class="seccion"><h1>Margarita</h1></div>
<div id="minion" class="seccion"><h1> Minion</h1></div>

<script>
let actual = document.querySelector(".seccion.active");
let secciones = ["main","gaby","evodio","margarita","minion"];
let index = 0;
const video = document.getElementById("bg-video");

function mostrar(id) {
    const nueva = document.getElementById(id);
    if (nueva === actual) return;

    actual.classList.remove("active");
    actual.classList.add("saliendo");

    setTimeout(() => {
        actual.classList.remove("saliendo");
    }, 700);

    nueva.classList.add("active");
    actual = nueva;
    index = secciones.indexOf(id);

    if (id === "main") {
        video.classList.remove("oculto");
    } else {
        video.classList.add("oculto");
    }

    toggleMenu();
}

function toggleMenu() {
    let menu = document.getElementById("menu");
    menu.style.left = (menu.style.left === "0px") ? "-220px" : "0px";
}

/* 📱 SWIPE PRO */
let startX = 0;
let startY = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;
    let endY = e.changedTouches[0].clientY;

    let dx = endX - startX;
    let dy = endY - startY;

    if (Math.abs(dx) > 100 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) {
            index = (index + 1) % secciones.length;
        } else {
            index = (index - 1 + secciones.length) % secciones.length;
        }
        mostrar(secciones[index]);
    }
});
</script>

<script>
const mensaje = `Mi amor...

Desde que llegaste a mi vida,
todo tiene más color.

Cada latido, cada sonrisa,
me recuerda lo afortunado que soy
por tenerte.

Te amo hoy y siempre 💖`;

let i = 0;
function escribir() {
    if (i <= mensaje.length) {
        document.getElementById("carta").textContent = mensaje.slice(0, i);
        i++;
        setTimeout(escribir, 40);
    }
}
escribir();
</script>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let elementos = [];

function crear(tipo) {
    elementos.push({
        x: Math.random() * canvas.width,
        y: canvas.height,
        vy: Math.random() * 2 + 1,
        tipo: tipo
    });
}

function animar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    elementos.forEach((e, i) => {
        e.y -= e.vy;
        ctx.font = "20px Arial";
        ctx.fillText(e.tipo, e.x, e.y);

        if (e.y < 0) elementos.splice(i, 1);
    });

    if (Math.random() < 0.3) crear("♥️");
    if (Math.random() < 0.2) crear("⭐");

    requestAnimationFrame(animar);
}
animar();
</script>

</body>
</html>
